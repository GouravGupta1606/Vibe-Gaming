<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Matching Game</title>
  <link href="https://fonts.cdnfonts.com/css/surprisedmonkey" rel="stylesheet">
  <style>
    html {
      height: 100%;
    }

    body {
      height: 100%;
      font-family: surprisedmonkey, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-image: url("img.jpg");
      background-size: cover;
      background-attachment: fixed;
      color: white;
    }

    h1 {
      margin-top: 20px;
      font-size: 2rem;
      text-shadow: 0 0 20px cyan;
      color: cyan;
    }

    .game-board {
      display: grid;
      grid-template-columns: repeat(4, 110px);
      gap: 12px;
      margin-top: 20px;
    }

    .card {
      width: 110px;
      height: 110px;
      background: #444;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 4rem;
      border-radius: 10px;
      position: relative;
      perspective: 1000px;
      transition: transform 0.1s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card .front,
    .card .back {
      position: absolute;
      width: 110px;
      height: 110px;
      backface-visibility: hidden;
      transition: transform 0.5s;
      border-radius: 10px;
    }

    .card .front {
      background-image: url("img2.jpg");
      background-size: cover;
      transform: rotateY(0deg);
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .card .back {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      transform: rotateY(180deg);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(0, 255, 255, 0.4);
      box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.1);
    }

    .card.flipped .front {
      transform: rotateY(180deg);
    }

    .card.flipped .back {
      transform: rotateY(360deg);
    }

    .card.matched .back {
      border: 2px solid lime;
      box-shadow: 0 0 15px lime, inset 0 0 15px rgba(0, 255, 0, 0.2);
      animation: matchPulse 0.5s ease;
    }

    @keyframes matchPulse {
      0% { transform: rotateY(360deg) scale(1); }
      50% { transform: rotateY(360deg) scale(1.1); }
      100% { transform: rotateY(360deg) scale(1); }
    }

    .stats {
      display: flex;
      gap: 40px;
      margin-top: 20px;
      background: rgba(0,0,0,0.5);
      padding: 10px 30px;
      border-radius: 20px;
      border: 1px solid rgba(0, 255, 255, 0.3);
    }

    .stat {
      text-align: center;
    }

    .stat span {
      font-size: 1.8rem;
      color: cyan;
      display: block;
    }

    .stat label {
      font-size: 0.9rem;
      color: #aaa;
    }

    .win-message {
      margin-top: 20px;
      font-size: 1.8rem;
      color: lime;
      text-shadow: 0 0 20px lime;
      animation: winGlow 1s infinite alternate;
      display: none;
    }

    @keyframes winGlow {
      from { text-shadow: 0 0 10px lime; }
      to { text-shadow: 0 0 40px lime, 0 0 60px lime; }
    }

    .restart-btn {
      margin-top: 16px;
      padding: 10px 30px;
      font-size: 1.1rem;
      font-family: surprisedmonkey, sans-serif;
      background: linear-gradient(135deg, #00f260, #0575e6);
      border: none;
      border-radius: 30px;
      color: white;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      display: none;
    }

    .restart-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.7);
    }

    .back-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 8px 20px;
      font-size: 0.9rem;
      font-family: surprisedmonkey, sans-serif;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(0,255,255,0.4);
      border-radius: 20px;
      color: cyan;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .back-btn:hover {
      background: rgba(0, 255, 255, 0.15);
    }
  </style>
</head>

<body>
  <a href="../home/index.html" class="back-btn">← Back to Home</a>
  <h1>🧠 Memory Match Game</h1>

  <div class="stats">
    <div class="stat">
      <span id="moves">0</span>
      <label>Moves</label>
    </div>
    <div class="stat">
      <span id="matched">0</span>
      <label>Matched</label>
    </div>
    <div class="stat">
      <span id="remaining">8</span>
      <label>Remaining</label>
    </div>
  </div>

  <div class="game-board" id="game-board"></div>

  <div class="win-message" id="win-msg">🎉 Congratulations! You Won!</div>
  <button class="restart-btn" id="restart-btn" onclick="initGame()">🔄 Play Again</button>

  <script>
    const emojis = ['🐶', '🐱', '🦊', '🐼', '🐸', '🐵', '🐯', '🦁'];

    let firstCard = null;
    let lockBoard = false;
    let moves = 0;
    let matchedPairs = 0;

    function shuffle(arr) {
      // Fisher-Yates shuffle for truly random positions
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function initGame() {
      moves = 0;
      matchedPairs = 0;
      firstCard = null;
      lockBoard = false;

      document.getElementById('moves').textContent = 0;
      document.getElementById('matched').textContent = 0;
      document.getElementById('remaining').textContent = 8;
      document.getElementById('win-msg').style.display = 'none';
      document.getElementById('restart-btn').style.display = 'none';

      const board = document.getElementById('game-board');
      board.innerHTML = '';

      // Duplicate and shuffle — each game a completely different card layout
      const cardValues = shuffle([...emojis, ...emojis]);

      cardValues.forEach(value => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.innerHTML = `<div class="front"></div><div class="back">${value}</div>`;
        card.addEventListener('click', () => flipCard(card, value));
        board.appendChild(card);
      });
    }

    function flipCard(card, value) {
      if (lockBoard || card.classList.contains('flipped') || card.classList.contains('matched')) return;

      card.classList.add('flipped');

      if (!firstCard) {
        firstCard = { card, value };
        return;
      }

      // Second card flipped
      moves++;
      document.getElementById('moves').textContent = moves;
      lockBoard = true;

      if (firstCard.value === value) {
        // Match!
        firstCard.card.classList.add('matched');
        card.classList.add('matched');
        matchedPairs++;
        document.getElementById('matched').textContent = matchedPairs;
        document.getElementById('remaining').textContent = 8 - matchedPairs;

        firstCard = null;
        lockBoard = false;

        if (matchedPairs === 8) {
          setTimeout(() => {
            document.getElementById('win-msg').style.display = 'block';
            document.getElementById('restart-btn').style.display = 'inline-block';
          }, 400);
        }
      } else {
        // No match — flip back
        const second = card;
        const first = firstCard.card;
        firstCard = null;
        setTimeout(() => {
          second.classList.remove('flipped');
          first.classList.remove('flipped');
          lockBoard = false;
        }, 900);
      }
    }

    // Start the game on load
    initGame();
  </script>
</body>

</html>
